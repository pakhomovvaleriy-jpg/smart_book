name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Профиль сборки'
        required: true
        default: 'rustore'
        type: choice
        options:
          - preview
          - rustore

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Check EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "❌ EXPO_TOKEN is EMPTY — секрет не передаётся"
            exit 1
          else
            echo "✅ EXPO_TOKEN is set, length: ${#EXPO_TOKEN}"
          fi

      - name: Build APK (локально на GitHub, не считается в лимит EAS)
        run: |
          if [ "${{ inputs.profile }}" = "rustore" ]; then
            eas build --platform android --profile rustore --local --non-interactive --output ./smartbook-rustore.apk
          else
            eas build --platform android --profile preview --local --non-interactive --output ./smartbook-preview.apk
          fi

      - name: Upload RuStore APK
        if: ${{ inputs.profile == 'rustore' }}
        uses: actions/upload-artifact@v4
        with:
          name: smartbook-rustore
          path: ./smartbook-rustore.apk
          retention-days: 30

      - name: Upload Preview APK
        if: ${{ inputs.profile == 'preview' }}
        uses: actions/upload-artifact@v4
        with:
          name: smartbook-preview
          path: ./smartbook-preview.apk
          retention-days: 7
