name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Профиль сборки'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - rustore

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build APK (preview — локально, не считается в лимит EAS)
        if: ${{ inputs.profile == 'preview' }}
        run: eas build --platform android --profile preview --local --non-interactive --output ./smartbook-preview.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload preview APK
        if: ${{ inputs.profile == 'preview' }}
        uses: actions/upload-artifact@v4
        with:
          name: smartbook-preview
          path: ./smartbook-preview.apk
          retention-days: 7

      - name: Build APK (rustore — облачная сборка EAS с подписью)
        if: ${{ inputs.profile == 'rustore' }}
        run: eas build --platform android --profile rustore --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
